name: Generate Contribution Snake

on:
  schedule:
    - cron: '10 15 * * *'  # Daily 00:10 KST (telemetry 직후)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: T0C0-AI
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=#111111&color_dots=#ebedf0,#ffe9a8,#ffd94d,#ffcc00,#b3a100
            dist/snake-dark.svg?palette=github-dark&color_snake=#FFE600&color_dots=#161616,#4d4500,#807300,#c0ad00,#FFE600

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
