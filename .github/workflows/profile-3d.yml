name: Generate 3D Contribution Calendar

on:
  schedule:
    - cron: '20 15 * * *'  # Daily 00:20 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contrib
        uses: yoshi389111/github-profile-3d-contrib@0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          git diff --cached --quiet && exit 0
          git commit -m "chore: update 3d contribution calendar"
          git push
