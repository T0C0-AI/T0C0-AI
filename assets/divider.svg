<svg viewBox="0 0 1200 16" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="구분선">
  <defs>
    <linearGradient id="dLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="20%" stop-color="#22D3EE" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#8B949E" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#FFC831" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFC831" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="comet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFC831" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFC831" stop-opacity="1"/>
    </linearGradient>
    <filter id="dsoft" x="-100%" y="-400%" width="300%" height="900%"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>
  <rect x="0" y="7.1" width="1200" height="1.8" fill="url(#dLine)"/>
  <g filter="url(#dsoft)">
    <rect x="0" y="6.3" width="110" height="3.4" fill="url(#comet)">
      <animate attributeName="x" values="-110;1200" dur="4.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
