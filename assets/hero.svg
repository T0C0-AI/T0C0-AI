<svg viewBox="0 0 940 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="강다니엘 — T0C0-AI 솔로 메이커">
  <style>
    text { font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
    .mono { font-family: 'Cascadia Code', 'D2Coding', Consolas, monospace; }
    .role { opacity: 0; animation: cyc 12s linear infinite; }
    .r2 { animation-delay: 3s; } .r3 { animation-delay: 6s; } .r4 { animation-delay: 9s; }
    @keyframes cyc { 0% {opacity:0} 3% {opacity:1} 22% {opacity:1} 25% {opacity:0} 100% {opacity:0} }
    .blink { animation: bl 1.1s steps(1) infinite; }
    @keyframes bl { 50% {opacity:0} }
  </style>

  <defs>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#161616" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect x="12" y="12" width="906" height="266"/>
    </clipPath>
  </defs>

  <!-- neo-brutal frame: hard yellow shadow + black panel -->
  <rect x="22" y="22" width="908" height="268" fill="#FFE600"/>
  <rect x="10" y="10" width="908" height="268" fill="#0A0A0A" stroke="#FFE600" stroke-width="3"/>
  <rect x="12" y="12" width="904" height="238" fill="url(#grid)"/>

  <g clip-path="url(#frame)">

    <!-- ── pixel TOCO (penguin + cat ears) on yellow panel ── -->
    <rect x="52" y="74" width="150" height="150" fill="#FFFFFF"/>
    <rect x="44" y="66" width="150" height="150" fill="#FFE600"/>
    <g transform="translate(60,78)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="2.6s" repeatCount="indefinite"/>
        <!-- cat tail (swish) -->
        <g fill="#0A0A0A">
          <animateTransform attributeName="transform" type="rotate" values="0 99 72; 14 99 72; 0 99 72" dur="3.2s" repeatCount="indefinite"/>
          <rect x="99" y="63" width="9" height="9"/>
          <rect x="108" y="54" width="9" height="9"/>
          <rect x="108" y="45" width="9" height="9"/>
        </g>
        <!-- cat ears -->
        <g fill="#0A0A0A">
          <rect x="18" y="0" width="9" height="9"/>
          <rect x="81" y="0" width="9" height="9"/>
          <rect x="9" y="9" width="27" height="9"/>
          <rect x="72" y="9" width="27" height="9"/>
        </g>
        <rect x="18" y="9" width="9" height="9" fill="#FF6B9D"/>
        <rect x="81" y="9" width="9" height="9" fill="#FF6B9D"/>
        <!-- body -->
        <rect x="18" y="18" width="72" height="9" fill="#0A0A0A"/>
        <rect x="9" y="27" width="90" height="81" fill="#0A0A0A"/>
        <rect x="18" y="108" width="72" height="9" fill="#0A0A0A"/>
        <!-- white front -->
        <rect x="27" y="27" width="54" height="81" fill="#FFFFFF"/>
        <!-- eyes (blink) -->
        <g fill="#0A0A0A">
          <g>
            <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.9;0.91;0.97;0.98" dur="4.2s" repeatCount="indefinite"/>
            <rect x="36" y="36" width="9" height="9"/>
            <rect x="63" y="36" width="9" height="9"/>
          </g>
          <g>
            <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.9;0.91;0.97;0.98" dur="4.2s" repeatCount="indefinite"/>
            <rect x="36" y="41" width="9" height="3"/>
            <rect x="63" y="41" width="9" height="3"/>
          </g>
        </g>
        <!-- beak / cheeks / feet -->
        <rect x="45" y="45" width="18" height="9" fill="#FF8A00"/>
        <rect x="27" y="45" width="9" height="9" fill="#FF6B9D"/>
        <rect x="72" y="45" width="9" height="9" fill="#FF6B9D"/>
        <rect x="27" y="117" width="18" height="9" fill="#FF8A00"/>
        <rect x="63" y="117" width="18" height="9" fill="#FF8A00"/>
      </g>
    </g>

    <!-- ── text block ── -->
    <g>
      <rect x="253" y="55" width="252" height="24" fill="#FFFFFF"/>
      <rect x="250" y="52" width="252" height="24" fill="#FFE600"/>
      <text x="262" y="69" class="mono" font-size="12" font-weight="700" fill="#0A0A0A" letter-spacing="2">SOLO MAKER · EST. 2025.11</text>
    </g>

    <text x="254" y="132" font-size="56" font-weight="800" fill="#FFE600">강다니엘</text>
    <text x="250" y="128" font-size="56" font-weight="800" fill="#FFFFFF">강다니엘</text>
    <rect x="502" y="88" width="20" height="42" fill="#FFE600" class="blink"/>

    <text x="250" y="160" class="mono" font-size="15" fill="#8B8B8B">Daniel Kang — @T0C0-AI · 토코AI 만든 사람</text>

    <text x="250" y="202" font-size="20" font-weight="700" fill="#FFE600">▸</text>
    <g font-size="20" font-weight="600" fill="#FFFFFF">
      <text x="272" y="202" class="role r1">1인 프로덕트 메이커 — 아이디어에서 배포까지 혼자</text>
      <text x="272" y="202" class="role r2">바이브코더 — AI와 페어로, 미친 속도로</text>
      <text x="272" y="202" class="role r3">멀티 에이전트 오케스트레이션 연구자</text>
      <text x="272" y="202" class="role r4">토코(TOCO) 유니버스 제작자 🐧</text>
    </g>

    <!-- corner deco -->
    <g fill="#FFE600" class="mono" font-size="18">
      <text x="868" y="46">+</text>
      <text x="838" y="76">+</text>
      <rect x="884" y="60" width="10" height="10" class="blink"/>
    </g>

    <!-- ── marquee ── -->
    <rect x="12" y="250" width="904" height="28" fill="#111111"/>
    <line x1="12" y1="250" x2="916" y2="250" stroke="#FFE600" stroke-width="2"/>
    <g>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-880 0" dur="20s" repeatCount="indefinite"/>
      <text x="12" y="269" class="mono" font-size="13" fill="#FFE600" letter-spacing="1" textLength="880">SHIP FAST ★ SOLO MAKER ★ VIBE CODER ★ MULTI-AGENT ORCHESTRATION ★ TOCO UNIVERSE ★ CHANGWON, KR ★ NEO-BRUTALISM ★ </text>
      <text x="892" y="269" class="mono" font-size="13" fill="#FFE600" letter-spacing="1" textLength="880">SHIP FAST ★ SOLO MAKER ★ VIBE CODER ★ MULTI-AGENT ORCHESTRATION ★ TOCO UNIVERSE ★ CHANGWON, KR ★ NEO-BRUTALISM ★ </text>
    </g>
  </g>
</svg>
