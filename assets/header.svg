<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020814"/>
      <stop offset="50%" stop-color="#040E22"/>
      <stop offset="100%" stop-color="#030912"/>
    </linearGradient>
    <radialGradient id="nebulaR" cx="78%" cy="40%" r="45%" gradientUnits="userSpaceOnUse" fx="78%" fy="40%">
      <stop offset="0%" stop-color="#1E1B4B" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#0A0A2E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020814" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaL" cx="18%" cy="80%" r="35%" gradientUnits="userSpaceOnUse" fx="18%" fy="80%">
      <stop offset="0%" stop-color="#0C1F3A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#020814" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planetBody" cx="30%" cy="28%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="40%" stop-color="#6D28D9"/>
      <stop offset="75%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.05"/>
      <stop offset="35%" stop-color="#00F5FF" stop-opacity="0.85"/>
      <stop offset="65%" stop-color="#7C3AED" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="planetClip">
      <rect x="662" y="0" width="238" height="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>
  <rect width="900" height="280" fill="url(#nebulaR)"/>
  <rect width="900" height="280" fill="url(#nebulaL)"/>

  <!-- Subtle grid lines -->
  <g stroke="#0E2A4A" stroke-width="0.4" opacity="0.45">
    <line x1="0" y1="93" x2="900" y2="93"/>
    <line x1="0" y1="186" x2="900" y2="186"/>
    <line x1="580" y1="0" x2="580" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- Stars — white -->
  <g fill="white">
    <circle cx="38" cy="14" r="1.3" opacity="0.9"/>
    <circle cx="80" cy="40" r="0.9" opacity="0.7"/>
    <circle cx="165" cy="9" r="1.5" opacity="0.85"/>
    <circle cx="242" cy="32" r="0.8" opacity="0.6"/>
    <circle cx="380" cy="7" r="1.2" opacity="0.75"/>
    <circle cx="455" cy="26" r="0.9" opacity="0.5"/>
    <circle cx="488" cy="55" r="1.1" opacity="0.8"/>
    <circle cx="520" cy="12" r="1.3" opacity="0.7"/>
    <circle cx="70"  cy="248" r="1.0" opacity="0.6"/>
    <circle cx="138" cy="222" r="1.4" opacity="0.75"/>
    <circle cx="200" cy="265" r="0.9" opacity="0.55"/>
    <circle cx="295" cy="238" r="1.2" opacity="0.65"/>
    <circle cx="360" cy="258" r="0.8" opacity="0.7"/>
    <circle cx="412" cy="242" r="1.0" opacity="0.6"/>
    <circle cx="612" cy="18"  r="1.2" opacity="0.7"/>
    <circle cx="648" cy="45"  r="0.8" opacity="0.5"/>
    <circle cx="666" cy="250" r="1.1" opacity="0.65"/>
    <circle cx="632" cy="265" r="0.9" opacity="0.55"/>
  </g>
  <!-- Stars — cyan -->
  <g fill="#00F5FF" filter="url(#starGlow)">
    <circle cx="318" cy="10" r="1.2" opacity="0.75"/>
    <circle cx="192" cy="258" r="1.1" opacity="0.65"/>
  </g>
  <!-- Stars — purple -->
  <g fill="#A855F7" filter="url(#starGlow)">
    <circle cx="505" cy="38" r="1.3" opacity="0.8"/>
    <circle cx="423" cy="250" r="1.0" opacity="0.7"/>
  </g>

  <!-- 4-point sparkle 1 (white) -->
  <g fill="white" opacity="0.75">
    <path d="M635 22 L637.5 15 L640 22 L637.5 29 Z"/>
    <path d="M630 22 L637.5 19.5 L645 22 L637.5 24.5 Z"/>
  </g>
  <!-- 4-point sparkle 2 (cyan) -->
  <g fill="#00F5FF" opacity="0.85" filter="url(#starGlow)">
    <path d="M499 74 L501 68 L503 74 L501 80 Z"/>
    <path d="M495 74 L501 72 L507 74 L501 76 Z"/>
  </g>
  <!-- 4-point sparkle 3 (white, left lower) -->
  <g fill="white" opacity="0.6">
    <path d="M440 258 L442 252 L444 258 L442 264 Z"/>
    <path d="M436 258 L442 256 L448 258 L442 260 Z"/>
  </g>

  <!-- ── PLANET (right section) ── -->
  <g clip-path="url(#planetClip)">
    <!-- Atmospheric glow halos -->
    <circle cx="782" cy="128" r="70" fill="#3B1F8C" opacity="0.18"/>
    <circle cx="782" cy="128" r="60" fill="#4C1D95" opacity="0.2"/>

    <!-- Ring — back half -->
    <ellipse cx="782" cy="141" rx="90" ry="18" fill="none"
      stroke="url(#ringGrad)" stroke-width="3.5" opacity="0.6"/>

    <!-- Planet body -->
    <circle cx="782" cy="128" r="52" fill="url(#planetBody)"/>

    <!-- Surface band overlays -->
    <ellipse cx="782" cy="112" rx="52" ry="14" fill="#5B21B6" opacity="0.3"/>
    <ellipse cx="782" cy="142" rx="52" ry="9"  fill="#3B1F8C" opacity="0.3"/>

    <!-- Specular highlight -->
    <ellipse cx="762" cy="110" rx="19" ry="14" fill="white" opacity="0.07"
      transform="rotate(-25 762 110)"/>

    <!-- Planet outline glow -->
    <circle cx="782" cy="128" r="52" fill="none" stroke="#7C3AED" stroke-width="1.2" opacity="0.5"/>
    <circle cx="782" cy="128" r="54" fill="none" stroke="#A855F7" stroke-width="0.8"
      opacity="0.25" filter="url(#strongGlow)"/>

    <!-- Ring — front half (over planet) -->
    <ellipse cx="782" cy="141" rx="90" ry="18" fill="none"
      stroke="url(#ringGrad)" stroke-width="3.5" opacity="0.88"
      stroke-dasharray="282 284"/>
    <!-- Mask top of ring that goes behind planet -->
    <ellipse cx="782" cy="128" rx="90" ry="12" fill="#020814" opacity="0.6"/>
    <!-- Re-draw bottom ring arc on top -->
    <ellipse cx="782" cy="140" rx="90" ry="18" fill="none"
      stroke="url(#ringGrad)" stroke-width="3" opacity="0.9"
      stroke-dasharray="0 282 284 0"/>

    <!-- Large moon -->
    <circle cx="860" cy="82" r="8"  fill="#1E1B4B"/>
    <circle cx="860" cy="82" r="8"  fill="none" stroke="#6D28D9" stroke-width="1.5" opacity="0.8"/>
    <circle cx="860" cy="82" r="4"  fill="#2D1B69" opacity="0.85"/>
    <circle cx="858" cy="80" r="1.5" fill="white" opacity="0.12"/>
    <!-- Orbit trace -->
    <ellipse cx="782" cy="92" rx="82" ry="44"
      fill="none" stroke="#6D28D9" stroke-width="0.4"
      stroke-dasharray="3,6" opacity="0.28"/>

    <!-- Small moon -->
    <circle cx="708" cy="182" r="5"  fill="#0E1A3A"/>
    <circle cx="708" cy="182" r="5"  fill="none" stroke="#00F5FF" stroke-width="1" opacity="0.5"/>

    <!-- Planet far glow -->
    <circle cx="782" cy="128" r="58" fill="none" stroke="#A855F7"
      stroke-width="0.4" opacity="0.12" filter="url(#strongGlow)"/>
  </g>

  <!-- Vertical dashed separator + dot accent -->
  <line x1="662" y1="0" x2="662" y2="280"
    stroke="#1E3A5F" stroke-width="0.6" stroke-dasharray="4,7" opacity="0.4"/>
  <circle cx="662" cy="140" r="3.5" fill="#00F5FF" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="662" cy="50"  r="2"   fill="#A855F7" opacity="0.6"/>
  <circle cx="662" cy="232" r="2"   fill="#A855F7" opacity="0.6"/>

  <!-- ── MAIN TEXT ── -->

  <!-- "Hi" — cyan with glow -->
  <text x="50" y="91"
    font-family="'Segoe UI','SF Pro Display',-apple-system,system-ui,sans-serif"
    font-size="62" font-weight="800" fill="#00F5FF" filter="url(#softGlow)">Hi</text>

  <!-- " there!" — white -->
  <text x="127" y="91"
    font-family="'Segoe UI','SF Pro Display',-apple-system,system-ui,sans-serif"
    font-size="62" font-weight="800" fill="#E2E8F0"> there!</text>

  <!-- Wave hand emoji -->
  <text x="448" y="88"
    font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif"
    font-size="50">👋</text>

  <!-- Description — line 1 -->
  <text x="50" y="134"
    font-family="'Segoe UI','SF Pro Text',-apple-system,system-ui,sans-serif"
    font-size="17" fill="#94A3B8">I'm a developer who enjoys turning ideas</text>

  <!-- Description — line 2 (accent) -->
  <text x="50" y="158"
    font-family="'Segoe UI','SF Pro Text',-apple-system,system-ui,sans-serif"
    font-size="17">
    <tspan fill="#94A3B8">into </tspan>
    <tspan fill="#00F5FF" font-weight="600">real-world solutions.</tspan>
  </text>

  <!-- ── TAG PILLS ── -->
  <!-- Pill 1 -->
  <rect x="50" y="173" width="143" height="30" rx="15" fill="#081624" stroke="#1E3A5F" stroke-width="1"/>
  <text x="121" y="192" text-anchor="middle"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" fill="#8B9EB7">🧩 Problem Solver</text>

  <!-- Pill 2 (active) -->
  <rect x="203" y="173" width="156" height="30" rx="15" fill="#0D2137" stroke="#00F5FF" stroke-width="1.3"/>
  <text x="281" y="192" text-anchor="middle"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" fill="#00F5FF" font-weight="600">💻 Full-Stack Dev</text>

  <!-- Pill 3 -->
  <rect x="369" y="173" width="128" height="30" rx="15" fill="#081624" stroke="#1E3A5F" stroke-width="1"/>
  <text x="433" y="192" text-anchor="middle"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" fill="#8B9EB7">🤖 AI Engineer</text>

  <!-- ── STATS ROW ── -->
  <text x="50" y="237"
    font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
    font-size="26" font-weight="700" fill="#00F5FF">10+</text>
  <text x="50" y="255"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#4B5E76">Projects</text>

  <line x1="108" y1="221" x2="108" y2="262" stroke="#1E3A5F" stroke-width="1"/>

  <text x="120" y="237"
    font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
    font-size="26" font-weight="700" fill="#E2E8F0">3+</text>
  <text x="120" y="255"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#4B5E76">Years Coding</text>

  <line x1="196" y1="221" x2="196" y2="262" stroke="#1E3A5F" stroke-width="1"/>

  <text x="208" y="237"
    font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
    font-size="26" font-weight="700" fill="#E2E8F0">15+</text>
  <text x="208" y="255"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#4B5E76">Technologies</text>

  <line x1="296" y1="221" x2="296" y2="262" stroke="#1E3A5F" stroke-width="1"/>

  <text x="308" y="237"
    font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
    font-size="28" font-weight="700" fill="#A855F7">∞</text>
  <text x="308" y="255"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#4B5E76">Curiosity</text>

  <!-- Top/bottom border lines -->
  <line x1="0" y1="0"   x2="900" y2="0"   stroke="#1E3A5F" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="279" x2="900" y2="279" stroke="#1E3A5F" stroke-width="0.5" opacity="0.5"/>
</svg>
