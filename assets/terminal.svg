<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="터미널 — whoami">
  <style>
    text { font-family: 'Cascadia Code', 'D2Coding', Consolas, 'Malgun Gothic', monospace; font-size: 15px; }
    .cmd { fill: #FFFFFF; }
    .out { fill: #B9BFC7; }
    .yel { fill: #FFE600; }
    .dim { fill: #6E7681; }
  </style>

  <defs>
    <clipPath id="t1"><rect x="28" y="55" width="0" height="24"><animate attributeName="width" begin="0.3s" dur="0.5s" from="0" to="640" fill="freeze"/></rect></clipPath>
    <clipPath id="t3"><rect x="28" y="109" width="0" height="24"><animate attributeName="width" begin="1.6s" dur="0.6s" from="0" to="640" fill="freeze"/></rect></clipPath>
    <clipPath id="t6"><rect x="28" y="190" width="0" height="24"><animate attributeName="width" begin="3.6s" dur="0.6s" from="0" to="640" fill="freeze"/></rect></clipPath>
    <clipPath id="t8"><rect x="28" y="244" width="0" height="24"><animate attributeName="width" begin="5.1s" dur="0.6s" from="0" to="640" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- window: hard shadow + panel + title bar -->
  <rect x="16" y="16" width="856" height="376" fill="#FFE600"/>
  <rect x="8" y="8" width="856" height="376" fill="#0D0D0D" stroke="#FFE600" stroke-width="3"/>
  <rect x="10" y="10" width="852" height="32" fill="#161616"/>
  <line x1="10" y1="42" x2="862" y2="42" stroke="#FFE600" stroke-width="2"/>
  <rect x="24" y="20" width="12" height="12" fill="#FFE600"/>
  <rect x="44" y="20" width="12" height="12" fill="#FFFFFF"/>
  <rect x="64" y="20" width="12" height="12" fill="#555555"/>
  <text x="436" y="31" text-anchor="middle" class="dim" font-size="13">daniel@toco-universe — zsh</text>

  <!-- L1  $ whoami -->
  <g clip-path="url(#t1)">
    <text x="28" y="72"><tspan class="yel">$ </tspan><tspan class="cmd">whoami</tspan></text>
  </g>
  <!-- L2 -->
  <text x="28" y="99" class="out" opacity="0">강다니엘 (Daniel) — 1인 프로덕트 메이커 · 바이브코더
    <animate attributeName="opacity" begin="1.0s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L3  $ cat now.txt -->
  <g clip-path="url(#t3)">
    <text x="28" y="126"><tspan class="yel">$ </tspan><tspan class="cmd">cat ~/now.txt</tspan></text>
  </g>
  <!-- L4/L5 -->
  <text x="28" y="153" class="out" opacity="0"><tspan class="yel">▸ </tspan>멀티 에이전트 오케스트레이션 — AI가 팀으로 일하게 만드는 법
    <animate attributeName="opacity" begin="2.5s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <text x="28" y="180" class="out" opacity="0"><tspan class="yel">▸ </tspan>TOCO 유니버스 확장 — 자막 · 더빙 · 숏폼 자동화 파이프라인
    <animate attributeName="opacity" begin="2.9s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L6  $ ls -->
  <g clip-path="url(#t6)">
    <text x="28" y="207"><tspan class="yel">$ </tspan><tspan class="cmd">ls ~/shipping/</tspan></text>
  </g>
  <!-- L7 -->
  <text x="28" y="234" opacity="0"><tspan class="yel">tocosteps/  stockmind/  orchestrator/  dn8-assistant/  toko-creator/</tspan><tspan class="dim">  …+20</tspan>
    <animate attributeName="opacity" begin="4.5s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L8  $ echo -->
  <g clip-path="url(#t8)">
    <text x="28" y="261"><tspan class="yel">$ </tspan><tspan class="cmd">echo $MISSION</tspan></text>
  </g>
  <!-- L9 -->
  <text x="28" y="288" opacity="0" class="yel" font-weight="700">"혼자서, AI 팀과 함께, 끝까지 배포한다."
    <animate attributeName="opacity" begin="6.0s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L10 prompt + cursor -->
  <text x="28" y="315" class="yel" opacity="0">$
    <animate attributeName="opacity" begin="6.5s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <rect x="46" y="301" width="10" height="18" fill="#FFE600" opacity="0">
    <animate attributeName="opacity" begin="6.5s" values="1;0;1" keyTimes="0;0.5;1" calcMode="discrete" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
