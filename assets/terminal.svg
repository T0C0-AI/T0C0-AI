<svg viewBox="0 0 900 356" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="터미널 — whoami">
  <style>
    text { font-family: 'Cascadia Code', 'D2Coding', Consolas, 'Malgun Gothic', monospace; font-size: 15px; }
    .cmd { fill: #E6EDF3; }
    .out { fill: #9DA7B3; }
    .cyn { fill: #67E8F9; }
    .gld { fill: #FFC831; }
    .dim { fill: #58606B; }
  </style>

  <defs>
    <linearGradient id="tEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#1F2733" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFC831" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="tGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="100%" stop-color="#FFC831"/>
    </linearGradient>
    <clipPath id="k1"><rect x="30" y="58" width="0" height="24"><animate attributeName="width" begin="0.3s" dur="0.5s" from="0" to="640" fill="freeze"/></rect></clipPath>
    <clipPath id="k3"><rect x="30" y="112" width="0" height="24"><animate attributeName="width" begin="1.6s" dur="0.6s" from="0" to="640" fill="freeze"/></rect></clipPath>
    <clipPath id="k6"><rect x="30" y="193" width="0" height="24"><animate attributeName="width" begin="3.6s" dur="0.6s" from="0" to="640" fill="freeze"/></rect></clipPath>
    <clipPath id="k8"><rect x="30" y="247" width="0" height="24"><animate attributeName="width" begin="5.1s" dur="0.6s" from="0" to="640" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- 유리 패널 -->
  <rect x="4" y="4" width="892" height="348" rx="4" fill="#07090D"/>
  <rect x="4.5" y="4.5" width="891" height="347" rx="4" fill="none" stroke="url(#tEdge)" stroke-width="1.2"/>
  <rect x="6" y="6" width="888" height="1" fill="#FFFFFF" opacity="0.05"/>

  <!-- 타이틀 바 -->
  <rect x="5" y="5" width="890" height="34" rx="4" fill="#0C1017"/>
  <line x1="5" y1="39.5" x2="895" y2="39.5" stroke="#1F2733" stroke-width="1"/>
  <circle cx="26" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="46" cy="22" r="6" fill="#FEBC2E"/>
  <circle cx="66" cy="22" r="6" fill="#28C840"/>
  <text x="450" y="27" text-anchor="middle" class="dim" font-size="13">daniel@toco-universe — zsh</text>

  <!-- L1  ➜ whoami -->
  <g clip-path="url(#k1)">
    <text x="30" y="75"><tspan class="cyn">➜ </tspan><tspan class="dim">~ </tspan><tspan class="cmd">whoami</tspan></text>
  </g>
  <!-- L2 -->
  <text x="30" y="102" class="out" opacity="0">강다니엘 (Daniel) — 1인 프로덕트 메이커 · 바이브코더
    <animate attributeName="opacity" begin="1.0s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L3  ➜ cat now.txt -->
  <g clip-path="url(#k3)">
    <text x="30" y="129"><tspan class="cyn">➜ </tspan><tspan class="dim">~ </tspan><tspan class="cmd">cat now.txt</tspan></text>
  </g>
  <!-- L4/L5 -->
  <text x="30" y="156" class="out" opacity="0"><tspan class="cyn">◆ </tspan>멀티 에이전트 오케스트레이션 — AI가 팀으로 일하게 만드는 법
    <animate attributeName="opacity" begin="2.5s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <text x="30" y="183" class="out" opacity="0"><tspan class="gld">◆ </tspan>TOCO 유니버스 확장 — 자막 · 더빙 · 숏폼 자동화 파이프라인
    <animate attributeName="opacity" begin="2.9s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L6  ➜ ls -->
  <g clip-path="url(#k6)">
    <text x="30" y="210"><tspan class="cyn">➜ </tspan><tspan class="dim">~ </tspan><tspan class="cmd">ls ~/shipping/</tspan></text>
  </g>
  <!-- L7 -->
  <text x="30" y="237" opacity="0"><tspan class="cyn">tocosteps/  stockmind/  orchestrator/  dn8-assistant/  toko-creator/</tspan><tspan class="dim">  …+20</tspan>
    <animate attributeName="opacity" begin="4.5s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L8  ➜ echo -->
  <g clip-path="url(#k8)">
    <text x="30" y="264"><tspan class="cyn">➜ </tspan><tspan class="dim">~ </tspan><tspan class="cmd">echo $MISSION</tspan></text>
  </g>
  <!-- L9 -->
  <text x="30" y="291" opacity="0" fill="url(#tGold)" font-weight="700">"혼자서, AI 팀과 함께, 끝까지 배포한다."
    <animate attributeName="opacity" begin="6.0s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <!-- L10 프롬프트 + 커서 -->
  <text x="30" y="318" class="cyn" opacity="0">➜ <tspan class="dim">~</tspan>
    <animate attributeName="opacity" begin="6.5s" dur="0.01s" from="0" to="1" fill="freeze"/></text>
  <rect x="66" y="304" width="9" height="18" fill="#67E8F9" opacity="0">
    <animate attributeName="opacity" begin="6.5s" values="0.9;0;0.9" keyTimes="0;0.5;1" calcMode="discrete" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
